<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Earn | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        :root { --primary: #8b5cf6; --secondary: #d946ef; }
        body { font-family: 'Outfit', sans-serif; background: #060b18; color: white; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .btn-glow { background: linear-gradient(135deg, var(--primary), var(--secondary)); transition: 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .bottom-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="bg-[#060b18] pb-24">

    <div id="auth-flow" class="min-h-screen flex items-center justify-center p-6">
        <div id="auth-box" class="glass p-8 w-full max-w-sm">
            <h2 class="text-2xl font-black italic text-center mb-8" id="auth-title">NEXUS LOGIN</h2>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none text-sm" placeholder="Email Address">
                <input type="password" id="password" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 outline-none text-sm" placeholder="Password">
                <button type="submit" id="auth-btn" class="w-full btn-glow py-4 rounded-xl font-bold uppercase text-xs">Sign In</button>
            </form>
            <div class="mt-6 text-center">
                <button onclick="toggleAuthMode()" id="toggle-text" class="text-[10px] text-indigo-400 font-bold underline">Don't have an account? Sign Up</button>
            </div>
        </div>
        <div id="processing-box" class="glass p-10 text-center hidden">
            <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <h3 class="text-xl font-bold mb-2">Syncing Wallet...</h3>
            <div class="text-4xl font-black text-indigo-400" id="timer-digit">10</div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="p-6 flex justify-between items-center">
            <div><h1 class="text-xl font-black italic">NEXUS</h1><p id="user-display" class="text-[9px] text-slate-500 font-bold"></p></div>
            <button onclick="logout()" class="text-[10px] font-bold text-red-400">Logout</button>
        </header>

        <div class="px-6 mb-6">
            <div class="glass p-6 border-l-4 border-indigo-500 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-slate-400 font-bold uppercase">Wallet Balance</p>
                    <p class="text-4xl font-black">₹<span id="bal-text">0.00</span></p>
                </div>
                <i class="fas fa-wallet text-2xl text-indigo-500 opacity-30"></i>
            </div>
        </div>

        <div class="px-6 mb-6">
            <div class="glass p-4 text-center border-dashed border-white/10 overflow-hidden min-h-[100px]">
                <script async="async" data-cfasync="false" src="https://pl28842448.effectivegatecpm.com/910cbe7d7159b0ad3fc37cf03c0beaef/invoke.js"></script>
                <div id="container-910cbe7d7159b0ad3fc37cf03c0beaef"></div>
            </div>
        </div>

        <div id="tab-home" class="tab-content active px-6 space-y-4">
            <div class="glass p-5 text-center">
                <h3 class="font-black text-sm text-indigo-400 mb-1">DAILY REWARD</h3>
                <p class="text-[9px] text-slate-400 mb-4">Claim ₹0.60 daily.</p>
                <button id="claim-btn" class="w-full py-3 btn-glow rounded-xl font-black text-[10px] uppercase">Claim Reward</button>
            </div>

            <div class="glass p-5">
                <h3 class="font-black text-sm text-indigo-400 mb-4 tracking-widest uppercase">Bonus Tasks</h3>
                <div class="space-y-3">
                    <a href="https://t.me/+_KUCpKf_ZdhmZDk1" target="_blank" onclick="completeTask('tg_task', 2.0)" class="flex items-center justify-between bg-blue-500/10 p-4 rounded-xl border border-blue-500/20">
                        <div class="flex items-center gap-3"><i class="fab fa-telegram text-blue-400"></i><span class="text-[10px] font-bold">Join Telegram</span></div>
                        <span class="text-blue-400 font-bold text-[10px]">₹2.00</span>
                    </a>
                    <a href="https://www.instagram.com/best_nexus?igsh=aHQwbGp6a2I4aWQy" target="_blank" onclick="completeTask('ig_task', 2.0)" class="flex items-center justify-between bg-pink-500/10 p-4 rounded-xl border border-pink-500/20">
                        <div class="flex items-center gap-3"><i class="fab fa-instagram text-pink-400"></i><span class="text-[10px] font-bold">Follow Instagram</span></div>
                        <span class="text-pink-400 font-bold text-[10px]">₹2.00</span>
                    </a>
                </div>
            </div>
        </div>

        <div id="tab-refer" class="tab-content px-6">
            <div class="glass p-6 text-center">
                <h2 class="text-xl font-black italic mb-2">INVITE & EARN</h2>
                <p class="text-[10px] text-slate-400 mb-6">Earn ₹5.00 for every successful referral.</p>
                <input type="text" readonly id="ref-link" class="w-full bg-black/40 border border-slate-700 p-3 rounded-lg text-[9px] text-indigo-300 font-mono mb-4">
                <button onclick="copyRef()" class="w-full btn-glow py-3 rounded-lg text-xs font-bold">COPY LINK</button>
            </div>
        </div>

        <div id="tab-withdraw" class="tab-content px-6">
            <div class="glass p-6">
                <h2 class="text-lg font-black mb-1 uppercase">Withdraw</h2>
                <p class="text-[9px] text-slate-500 mb-6">Min: ₹50 | Max: ₹150</p>
                <div class="space-y-4">
                    <input type="text" id="upi-id" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-xs outline-none" placeholder="Enter UPI ID (e.g., name@okicici)">
                    <input type="number" id="w-amount" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 text-xs outline-none" placeholder="Amount (50-150)">
                    <button onclick="requestWithdraw()" class="w-full btn-glow py-4 rounded-xl font-bold text-xs">REQUEST PAYOUT</button>
                </div>
            </div>
        </div>

        <div id="tab-admin" class="tab-content px-6"><div id="user-list" class="space-y-3"></div></div>

        <nav class="bottom-nav fixed bottom-0 left-0 w-full h-20 flex items-center justify-around z-50">
            <button onclick="switchTab('home', this)" class="nav-item active flex flex-col items-center gap-1"><i class="fas fa-tasks text-xl"></i><span class="text-[9px] font-bold">TASKS</span></button>
            <button onclick="switchTab('refer', this)" class="nav-item flex flex-col items-center gap-1 text-slate-500"><i class="fas fa-user-plus text-xl"></i><span class="text-[9px] font-bold">INVITE</span></button>
            <button onclick="switchTab('withdraw', this)" class="nav-item flex flex-col items-center gap-1 text-slate-500"><i class="fas fa-wallet text-xl"></i><span class="text-[9px] font-bold">WALLET</span></button>
            <button id="admin-nav-btn" onclick="switchTab('admin', this)" class="hidden flex flex-col items-center gap-1 text-slate-500"><i class="fas fa-shield-alt text-xl"></i><span class="text-[9px] font-bold">ADMIN</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAazsOm5o_EE9H-etVMv2Qk3liDvd4sCd8",
            authDomain: "nexus-e8124.firebaseapp.com",
            databaseURL: "https://nexus-e8124-default-rtdb.firebaseio.com",
            projectId: "nexus-e8124",
            storageBucket: "nexus-e8124.firebasestorage.app",
            messagingSenderId: "423242639393",
            appId: "1:423242639393:web:15d569c83bbe7f16cf1b60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const ADMIN_EMAIL = "dah_law_pawk_rawh@gmail.com"; 

        let isLoginMode = true;
        let userData = null;

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "NEXUS LOGIN" : "NEXUS SIGNUP";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Sign In" : "Sign Up";
            document.getElementById('toggle-text').innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Login";
        };

        const urlParams = new URLSearchParams(window.location.search);
        const referrerId = urlParams.get('ref');

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            if(isLoginMode) {
                signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
            } else {
                createUserWithEmailAndPassword(auth, email, pass).then(async (cred) => {
                    await set(ref(db, 'users/' + cred.user.uid), {
                        email: email, balance: 50.00, tasks: {}
                    });
                    if(referrerId && referrerId !== cred.user.uid) {
                        runTransaction(ref(db, `users/${referrerId}`), (post) => {
                            if (post) post.balance = (post.balance || 0) + 5.00; // REFERRAL RATE ₹5
                            return post;
                        });
                    }
                }).catch(err => alert(err.message));
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('processing-box').classList.remove('hidden');
                onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        userData = data;
                        document.getElementById('bal-text').innerText = data.balance.toFixed(2);
                        document.getElementById('user-display').innerText = user.email;
                    }
                });
                if(user.email === ADMIN_EMAIL) {
                    document.getElementById('admin-nav-btn').classList.remove('hidden');
                    loadAdminData();
                }
                let t = 10;
                const timer = setInterval(() => {
                    t--;
                    document.getElementById('timer-digit').innerText = t;
                    if(t === 0) {
                        clearInterval(timer);
                        document.getElementById('auth-flow').classList.add('hidden');
                        document.getElementById('main-app').classList.remove('hidden');
                        document.getElementById('ref-link').value = window.location.origin + window.location.pathname + "?ref=" + user.uid;
                    }
                }, 1000);
            } else {
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('auth-flow').classList.remove('hidden');
            }
        });

        // Claim Reward: ₹0.60
        document.getElementById('claim-btn').addEventListener('click', () => {
            if(auth.currentUser && userData) {
                update(ref(db, 'users/' + auth.currentUser.uid), {
                    balance: userData.balance + 0.60
                }).then(() => { alert("₹0.60 Claimed!"); document.getElementById('claim-btn').disabled = true; });
            }
        });

        // Social Task Function
        window.completeTask = (taskName, reward) => {
            if(auth.currentUser && userData) {
                if(userData.tasks && userData.tasks[taskName]) {
                    alert("Already completed!");
                    return;
                }
                update(ref(db, 'users/' + auth.currentUser.uid), {
                    balance: userData.balance + reward,
                    [`tasks/${taskName}`]: true
                }).then(() => alert(`₹${reward} added for task!`));
            }
        };

        // Withdrawal Logic
        window.requestWithdraw = () => {
            const upi = document.getElementById('upi-id').value;
            const amt = parseFloat(document.getElementById('w-amount').value);
            if(amt < 50 || amt > 150) { alert("Amount must be between 50 and 150"); return; }
            if(userData.balance < amt) { alert("Insufficient balance"); return; }
            
            const wRef = ref(db, 'withdrawals/' + Date.now());
            set(wRef, { email: auth.currentUser.email, upi: upi, amount: amt, status: 'pending' })
            .then(() => {
                update(ref(db, 'users/' + auth.currentUser.uid), { balance: userData.balance - amt });
                alert("Withdrawal request sent!");
            });
        };

        function loadAdminData() {
            onValue(ref(db, 'users'), (snapshot) => {
                const users = snapshot.val();
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                for(let id in users) {
                    list.innerHTML += `<div class="glass p-3 text-[10px] border-l-2 border-indigo-500">${users[id].email} - ₹${users[id].balance.toFixed(2)}</div>`;
                }
            });
        }
        window.logout = () => signOut(auth);
    </script>
    <script>
        function switchTab(tabName, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active', 'text-indigo-400'));
            el.classList.add('active', 'text-indigo-400');
        }
        function copyRef() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Link Copied!");
        }
    </script>
</body>
                    </html>
