<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Platinum | Earning Revolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --primary: #6366f1; --accent: #a855f7; --bg: #030712; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .neo-gradient { background: linear-gradient(135deg, var(--primary), var(--accent)); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-active { color: var(--primary); transform: translateY(-5px); transition: 0.3s; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-28">

    <div id="auth-flow" class="min-h-screen flex items-center justify-center p-6 animate__animated animate__fadeIn">
        <div id="auth-box" class="glass p-8 w-full max-w-sm relative overflow-hidden">
            <div class="text-center mb-10">
                <h1 class="text-3xl font-extrabold tracking-tighter italic text-white">NEXUS<span class="text-indigo-500">.</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mt-2">Next Gen Earnings</p>
            </div>
            <form id="auth-form" class="space-y-4">
                <input type="email" id="email" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="Email Address">
                <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-sm outline-none" placeholder="Password">
                <button type="submit" id="auth-btn" class="w-full neo-gradient py-4 rounded-2xl font-bold text-sm shadow-lg uppercase active:scale-95 transition-transform">Sign In</button>
            </form>
            <button onclick="toggleAuthMode()" id="toggle-text" class="w-full text-center mt-6 text-[10px] text-slate-400 font-semibold uppercase tracking-widest">New member? Create Account</button>
        </div>
        
        <div id="processing-box" class="hidden text-center">
            <div class="relative w-20 h-20 mx-auto mb-4">
                <div class="absolute inset-0 rounded-full border-4 border-indigo-500/20"></div>
                <div class="absolute inset-0 rounded-full border-4 border-t-indigo-500 animate-spin"></div>
            </div>
            <h3 class="text-lg font-bold">Connecting...</h3>
        </div>
    </div>

    <div id="main-app" class="hidden animate__animated animate__fadeIn">
        <header class="p-6 flex justify-between items-center">
            <h2 class="text-xl font-black tracking-tighter italic">NEXUS<span class="text-indigo-500">.</span></h2>
            <button onclick="logout()" class="w-10 h-10 glass flex items-center justify-center text-red-400"><i class="fas fa-power-off"></i></button>
        </header>

        <div class="px-6 mb-8">
            <div class="glass p-8 relative overflow-hidden">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Available Balance</p>
                <p class="text-4xl font-black italic">₹<span id="bal-text">0.00</span></p>
                <div class="mt-4 flex gap-4">
                    <div class="bg-white/5 rounded-xl px-4 py-2 border border-white/5 text-center">
                        <p class="text-[8px] text-slate-500 uppercase">Invites</p>
                        <p id="ref-count" class="text-sm font-bold">0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-6 mb-8">
            <div class="glass p-4 min-h-[100px] border-dashed border-white/10 text-center">
                <script async="async" data-cfasync="false" src="https://pl28842448.effectivegatecpm.com/910cbe7d7159b0ad3fc37cf03c0beaef/invoke.js"></script>
                <div id="container-910cbe7d7159b0ad3fc37cf03c0beaef"></div>
            </div>
        </div>

        <div id="tab-home" class="tab-content active px-6 space-y-4">
            <div class="glass p-6 text-center">
                <h3 class="text-xs font-black text-indigo-300 uppercase mb-4">Daily Check-in</h3>
                <button id="claim-btn" class="w-full py-4 neo-gradient rounded-2xl font-black text-xs">CLAIM ₹0.60</button>
            </div>
            
            <a href="https://t.me/+_KUCpKf_ZdhmZDk1" target="_blank" onclick="completeTask('tg_task', 2.0)" class="glass p-5 flex justify-between items-center">
                <span class="text-xs font-bold"><i class="fab fa-telegram-plane mr-2 text-blue-400"></i>Telegram Task</span>
                <span class="text-xs font-black text-indigo-400">+₹2.00</span>
            </a>
            <a href="https://www.instagram.com/best_nexus?igsh=aHQwbGp6a2I4aWQy" target="_blank" onclick="completeTask('ig_task', 2.0)" class="glass p-5 flex justify-between items-center">
                <span class="text-xs font-bold"><i class="fab fa-instagram mr-2 text-pink-400"></i>Instagram Task</span>
                <span class="text-xs font-black text-indigo-400">+₹2.00</span>
            </a>
        </div>

        <div id="tab-refer" class="tab-content px-6 text-center">
            <div class="glass p-8">
                <h2 class="text-xl font-black mb-4 uppercase italic">Invite Friends</h2>
                <input type="text" readonly id="ref-link" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl text-[10px] text-indigo-300 text-center mb-4">
                <button onclick="copyRef()" class="w-full py-4 neo-gradient rounded-2xl font-black text-xs">COPY LINK</button>
            </div>
        </div>

        <div id="tab-withdraw" class="tab-content px-6 space-y-4">
            <div id="withdraw-locked" class="glass p-10 text-center">
                <i class="fas fa-lock text-red-500 mb-2"></i>
                <p class="text-xs font-bold">SYSTEM LOCKED</p>
                <p class="text-[10px] text-slate-500">Need 5 Invites (Currently: <span id="lock-invite-count">0</span>)</p>
            </div>
            <div id="withdraw-unlocked" class="hidden glass p-8">
                <h3 class="text-sm font-black mb-4">REQUEST WITHDRAWAL</h3>
                <p class="text-[9px] text-indigo-400 mb-4 uppercase">Opens on April 5, 2026</p>
                <input type="text" id="upi-id" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs mb-4 outline-none" placeholder="UPI ID">
                <input type="number" id="w-amount" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs mb-6 outline-none" placeholder="Amount (50-150)">
                <button id="w-btn" class="w-full py-4 bg-slate-800 text-slate-500 rounded-xl font-black text-[10px] cursor-not-allowed">LOCKED</button>
            </div>
        </div>

        <nav class="fixed bottom-6 left-6 right-6 h-20 glass flex items-center justify-around z-50 shadow-2xl">
            <button onclick="switchTab('home', this)" class="nav-item nav-active flex flex-col items-center"><i class="fas fa-bolt text-lg"></i><span class="text-[8px] font-bold">TASKS</span></button>
            <button onclick="switchTab('refer', this)" class="nav-item text-slate-500 flex flex-col items-center"><i class="fas fa-users text-lg"></i><span class="text-[8px] font-bold">REFER</span></button>
            <button onclick="switchTab('withdraw', this)" class="nav-item text-slate-500 flex flex-col items-center"><i class="fas fa-wallet text-lg"></i><span class="text-[8px] font-bold">WALLET</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAazsOm5o_EE9H-etVMv2Qk3liDvd4sCd8",
            authDomain: "nexus-e8124.firebaseapp.com",
            databaseURL: "https://nexus-e8124-default-rtdb.firebaseio.com",
            projectId: "nexus-e8124",
            storageBucket: "nexus-e8124.firebasestorage.app",
            messagingSenderId: "423242639393",
            appId: "1:423242639393:web:15d569c83bbe7f16cf1b60"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let isLoginMode = true;
        let userData = null;

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "NEXUS LOGIN" : "NEXUS SIGNUP";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Sign In" : "Sign Up";
            document.getElementById('toggle-text').innerText = isLoginMode ? "Create Account" : "Login Instead";
        };

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const rid = new URLSearchParams(window.location.search).get('ref');

            if(isLoginMode) {
                signInWithEmailAndPassword(auth, email, pass).catch(err => alert(err.message));
            } else {
                createUserWithEmailAndPassword(auth, email, pass).then(async (cred) => {
                    await set(ref(db, 'users/' + cred.user.uid), {
                        email: email, balance: 50.00, refCount: 0, tasks: {}
                    });
                    if(rid && rid !== cred.user.uid) {
                        runTransaction(ref(db, `users/${rid}`), (p) => {
                            if(p) { p.balance = (p.balance || 0) + 5; p.refCount = (p.refCount || 0) + 1; }
                            return p;
                        });
                    }
                }).catch(err => alert(err.message));
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('processing-box').classList.remove('hidden');
                onValue(ref(db, 'users/' + user.uid), (s) => {
                    userData = s.val();
                    if(userData) {
                        document.getElementById('bal-text').innerText = userData.balance.toFixed(2);
                        document.getElementById('ref-count').innerText = userData.refCount || 0;
                        document.getElementById('lock-invite-count').innerText = userData.refCount || 0;
                        if(userData.refCount >= 5) {
                            document.getElementById('withdraw-locked').classList.add('hidden');
                            document.getElementById('withdraw-unlocked').classList.remove('hidden');
                        }
                    }
                });
                setTimeout(() => {
                    document.getElementById('auth-flow').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('ref-link').value = window.location.origin + window.location.pathname + "?ref=" + user.uid;
                }, 1500);
            } else {
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('auth-flow').classList.remove('hidden');
            }
        });

        window.completeTask = (n, r) => {
            if(userData.tasks && userData.tasks[n]) return alert("Done already!");
            update(ref(db, 'users/' + auth.currentUser.uid), { balance: userData.balance + r, [`tasks/${n}`]: true });
        };

        document.getElementById('claim-btn').addEventListener('click', () => {
            update(ref(db, 'users/' + auth.currentUser.uid), { balance: userData.balance + 0.60 });
        });

        window.logout = () => signOut(auth);
    </script>

    <script>
        function switchTab(t, el) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active', 'text-indigo-400'));
            el.classList.add('nav-active', 'text-indigo-400');
        }
        function copyRef() {
            const c = document.getElementById("ref-link");
            c.select(); navigator.clipboard.writeText(c.value); alert("Copied!");
        }
    </script>
</body>
    </html>
